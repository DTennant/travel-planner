<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✈️ Bingchen & Yue 假期规划 — 从伦敦出发</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  :root {
    --bg: #0a0e17;
    --card-bg: #141b2d;
    --card-hover: #1a2340;
    --border: #1e2a45;
    --text: #e2e8f0;
    --text-dim: #8892a4;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,0.15);
    --green: #22c55e;
    --yellow: #eab308;
    --red: #ef4444;
    --orange: #f97316;
    --cyan: #06b6d4;
    --pink: #ec4899;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Header */
  .header {
    text-align: center;
    padding: 48px 24px 24px;
    background: linear-gradient(180deg, rgba(99,102,241,0.08) 0%, transparent 100%);
  }
  .header h1 {
    font-size: 2.2rem;
    font-weight: 800;
    background: linear-gradient(135deg, #818cf8, #c084fc, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header p {
    color: var(--text-dim);
    font-size: 1rem;
    font-weight: 300;
  }
  .header .names {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 6px 20px;
    margin-top: 12px;
    font-size: 0.9rem;
  }

  /* Month Slider */
  .slider-section {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 24px;
  }
  .slider-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 32px;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .slider-label span { font-weight: 600; font-size: 0.95rem; }
  .month-display {
    font-size: 1.3rem;
    font-weight: 700;
    color: #818cf8;
  }
  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: linear-gradient(90deg, #6366f1, #c084fc, #f472b6);
    outline: none;
    cursor: pointer;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid #6366f1;
    box-shadow: 0 0 12px rgba(99,102,241,0.4);
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: white;
    border: 3px solid #6366f1;
    box-shadow: 0 0 12px rgba(99,102,241,0.4);
    cursor: pointer;
  }
  .month-ticks {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-size: 0.7rem;
    color: var(--text-dim);
  }

  /* Sort Bar */
  .controls {
    max-width: 1400px;
    margin: 16px auto;
    padding: 0 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .controls label {
    font-size: 0.85rem;
    color: var(--text-dim);
    font-weight: 500;
  }
  .sort-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 0.82rem;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .sort-btn:hover { border-color: #6366f1; background: rgba(99,102,241,0.1); }
  .sort-btn.active { border-color: #6366f1; background: rgba(99,102,241,0.15); color: #818cf8; font-weight: 600; }

  /* Cards Grid */
  .cards-grid {
    max-width: 1400px;
    margin: 24px auto;
    padding: 0 24px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.3s ease;
    position: relative;
  }
  .card:hover {
    border-color: rgba(99,102,241,0.4);
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(0,0,0,0.3), 0 0 0 1px rgba(99,102,241,0.1);
  }

  .card-header {
    padding: 20px 20px 12px;
    position: relative;
  }
  .card-header .dest-name {
    font-size: 1.25rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-header .airport-code {
    font-size: 0.75rem;
    font-weight: 600;
    color: #818cf8;
    background: rgba(99,102,241,0.12);
    padding: 2px 8px;
    border-radius: 6px;
    letter-spacing: 0.5px;
  }
  .card-header .tagline {
    font-size: 0.85rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }
  .card-header .type-badge {
    position: absolute;
    top: 16px;
    right: 16px;
    font-size: 0.7rem;
    padding: 3px 10px;
    border-radius: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .type-beach { background: rgba(6,182,212,0.15); color: #22d3ee; }
  .type-city { background: rgba(236,72,153,0.15); color: #f472b6; }
  .type-culture { background: rgba(249,115,22,0.15); color: #fb923c; }
  .type-nature { background: rgba(34,197,94,0.15); color: #4ade80; }
  .type-adventure { background: rgba(139,92,246,0.15); color: #a78bfa; }

  .card-body {
    padding: 0 20px 16px;
  }

  .weather-strip {
    display: flex;
    align-items: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 12px;
  }
  .weather-strip .temp {
    font-size: 1.8rem;
    font-weight: 700;
    line-height: 1;
  }
  .weather-strip .weather-icon {
    font-size: 2rem;
  }
  .weather-strip .weather-desc {
    font-size: 0.82rem;
    color: var(--text-dim);
  }
  .weather-strip .rec-badge {
    margin-left: auto;
    font-size: 1.1rem;
  }

  .price-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
  }
  .price-item {
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
  }
  .price-item .price-label {
    font-size: 0.68rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 2px;
  }
  .price-item .price-value {
    font-size: 1rem;
    font-weight: 700;
    color: #22d3ee;
  }
  .price-item .price-value.hotel-price { color: #a78bfa; }
  .price-item .price-value.days-value { color: #f472b6; }

  .attractions {
    margin-top: 8px;
  }
  .attractions-title {
    font-size: 0.75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .attraction-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .attraction-tag {
    font-size: 0.73rem;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    padding: 3px 10px;
    border-radius: 12px;
    color: var(--text-dim);
  }

  .best-months {
    margin-top: 10px;
    font-size: 0.78rem;
    color: var(--text-dim);
  }
  .best-months strong { color: var(--green); font-weight: 600; }

  /* Budget Calculator */
  .budget-section {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 24px 60px;
  }
  .budget-container {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px 32px;
  }
  .budget-title {
    font-size: 1.2rem;
    font-weight: 700;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .budget-controls {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: end;
  }
  .budget-field {
    flex: 1;
    min-width: 200px;
  }
  .budget-field label {
    display: block;
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .budget-field select, .budget-field input {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-family: inherit;
    outline: none;
  }
  .budget-field select:focus, .budget-field input:focus {
    border-color: #6366f1;
  }
  .budget-field select option { background: var(--card-bg); }

  .budget-result {
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(192,132,252,0.1));
    border: 1px solid rgba(99,102,241,0.2);
    border-radius: 12px;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
    text-align: center;
  }
  .budget-item .b-label {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-bottom: 4px;
  }
  .budget-item .b-value {
    font-size: 1.3rem;
    font-weight: 700;
  }
  .budget-item .b-value.total {
    font-size: 1.8rem;
    background: linear-gradient(135deg, #818cf8, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 20px;
    color: var(--text-dim);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }

  /* Animation */
  .card { animation: fadeUp 0.5s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .header h1 { font-size: 1.5rem; }
    .cards-grid { grid-template-columns: 1fr; padding: 0 12px; }
    .price-row { grid-template-columns: 1fr; }
    .budget-controls { flex-direction: column; }
  }
</style>
</head>

<div class="header">

  <p>从伦敦出发 · 10个精选目的地 · 实时价格参考</p>
  <div class="names">👫 Bingchen & Yue · 2026–2027</div>
</div>

<!-- Month Slider -->

    </div>
  </div>
</div>

<!-- Sort Controls -->
<div class="controls">
  <label>排序：</label>
  <button class="sort-btn active" data-sort="default" onclick="sortCards('default')">🏆 推荐度</button>
  <button class="sort-btn" data-sort="price-asc" onclick="sortCards('price-asc')">💰 价格↑</button>
  <button class="sort-btn" data-sort="price-desc" onclick="sortCards('price-desc')">💰 价格↓</button>
  <button class="sort-btn" data-sort="temp-desc" onclick="sortCards('temp-desc')">🌡️ 温度↓</button>
  <button class="sort-btn" data-sort="temp-asc" onclick="sortCards('temp-asc')">🌡️ 温度↑</button>
</div>

<!-- Cards -->

<!-- Budget Calculator -->
<div class="budget-section">

        <label>目的地</label>
        <select id="budgetDest"></select>
      </div>
      <div class="budget-field">
        <label>天数</label>
        <input type="number" id="budgetDays" value="4" min="1" max="14">
      </div>
    </div>
    <div class="budget-result">
      <div class="budget-item">
        <div class="b-label">✈️ 往返机票 ×2</div>
        <div class="b-value" id="bFlights">—</div>
      </div>
      <div class="budget-item">
        <div class="b-label">🏨 酒店 (×晚)</div>
        <div class="b-value" id="bHotel">—</div>
      </div>
      <div class="budget-item">
        <div class="b-label">🍽️ 餐饮估算</div>
        <div class="b-value" id="bFood">—</div>
      </div>
      <div class="budget-item">
        <div class="b-label">💷 总计估算</div>
        <div class="b-value total" id="bTotal">—</div>
      </div>
    </div>
  </div>
</div>

<div class="footer">

  Built with ❤️ for Bingchen & Yue · 2026
</div>

// Month mapping: slider 0-9 → Jun2026 to Mar2027
const monthLabels = [
  '2026年6月', '2026年7月', '2026年8月', '2026年9月', '2026年10月',
  '2026年11月', '2026年12月', '2027年1月', '2027年2月', '2027年3月'
];

let currentMonthIdx = 0;
let currentSort = 'default';

// ============================================================
// RENDER
// ============================================================
function getFlightPrice(dest, monthIdx) {
  return Math.round(dest.flightBase * dest.flightMultiplier[monthIdx]);
}

function getRecScore(rec) {
  if (rec === '✅') return 3;
  if (rec === '⚠️') return 2;
  return 1;
}

function getTypeClass(type) {
  const map = { beach:'type-beach', city:'type-city', culture:'type-culture', nature:'type-nature', adventure:'type-adventure' };
  return map[type] || 'type-culture';
}

function getTempColor(temp) {
  if (temp >= 28) return '#ef4444';
  if (temp >= 22) return '#f97316';
  if (temp >= 16) return '#eab308';
  if (temp >= 10) return '#22d3ee';
  if (temp >= 5) return '#6366f1';
  return '#818cf8';
}

function getRecColor(rec) {
  if (rec === '✅') return 'var(--green)';
  if (rec === '⚠️') return 'var(--yellow)';
  return 'var(--red)';
}

function renderCards() {
  const grid = document.getElementById('cardsGrid');
  let sorted = [...destinations];

  const mi = currentMonthIdx;
  if (currentSort === 'price-asc') {
    sorted.sort((a, b) => getFlightPrice(a, mi) - getFlightPrice(b, mi));
  } else if (currentSort === 'price-desc') {
    sorted.sort((a, b) => getFlightPrice(b, mi) - getFlightPrice(a, mi));
  } else if (currentSort === 'temp-desc') {
    sorted.sort((a, b) => b.temps[mi] - a.temps[mi]);
  } else if (currentSort === 'temp-asc') {
    sorted.sort((a, b) => a.temps[mi] - b.temps[mi]);
  } else {
    // default: by recommendation then price
    sorted.sort((a, b) => {
      const rd = getRecScore(b.rec[mi]) - getRecScore(a.rec[mi]);
      if (rd !== 0) return rd;
      return getFlightPrice(a, mi) - getFlightPrice(b, mi);
    });
  }

  grid.innerHTML = sorted.map((d, i) => {
    const fp = getFlightPrice(d, mi);
    const temp = d.temps[mi];
    const wx = d.weather[mi];
    const wxDesc = d.weatherDesc[mi];
    const rec = d.rec[mi];

    return `
    <div class="card" style="animation-delay:${i * 0.05}s" data-id="${d.id}">
      <div class="card-header">
        <div class="dest-name">
          ${d.flag} ${d.name}
          <span class="airport-code">${d.code}</span>
        </div>
        <div class="tagline">${d.tagline}</div>
        <span class="type-badge ${getTypeClass(d.type)}">${d.typeLabel}</span>
      </div>
      <div class="card-body">
        <div class="weather-strip">
          <span class="weather-icon">${wx}</span>
          <div>
            <div class="temp" style="color:${getTempColor(temp)}">${temp}°C</div>
            <div class="weather-desc">${wxDesc}</div>
          </div>
          <span class="rec-badge" title="${rec === '✅' ? '推荐' : rec === '⚠️' ? '尚可' : '不推荐'}" style="font-size:1.4rem;filter:${rec === '❌' ? 'grayscale(0)' : 'none'}">${rec}</span>
        </div>
        <div class="price-row">
          <div class="price-item">
            <div class="price-label">✈️ 往返/人</div>
            <div class="price-value">£${fp}</div>
          </div>
          <div class="price-item">
            <div class="price-label">🏨 酒店/晚</div>
            <div class="price-value hotel-price">£${d.hotelPerNight}</div>
          </div>
          <div class="price-item">
            <div class="price-label">📅 推荐天数</div>
            <div class="price-value days-value">${d.days}天</div>
          </div>
        </div>
        <div class="attractions">
          <div class="attractions-title">🎯 主要玩点</div>
          <div class="attraction-tags">
            ${d.attractions.map(a => `<span class="attraction-tag">${a}</span>`).join('')}
          </div>
        </div>
        <div class="best-months">
          🗓️ 最佳月份：<strong>${d.bestMonths}</strong>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// SLIDER
// ============================================================
const slider = document.getElementById('monthSlider');
const display = document.getElementById('monthDisplay');

slider.addEventListener('input', () => {
  currentMonthIdx = parseInt(slider.value);
  display.textContent = monthLabels[currentMonthIdx];
  renderCards();
  updateBudget();
});

// ============================================================
// SORT
// ============================================================
function sortCards(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-sort="${sort}"]`).classList.add('active');
  renderCards();
}

// ============================================================
// BUDGET CALCULATOR
// ============================================================
function initBudgetSelect() {
  const sel = document.getElementById('budgetDest');
  sel.innerHTML = destinations.map(d =>
    `<option value="${d.id}">${d.flag} ${d.name} (${d.nameEn})</option>`
  ).join('');
  sel.addEventListener('change', updateBudget);
  document.getElementById('budgetDays').addEventListener('input', updateBudget);
}

function updateBudget() {
  const destId = document.getElementById('budgetDest').value;
  const days = parseInt(document.getElementById('budgetDays').value) || 4;
  const dest = destinations.find(d => d.id === destId);
  if (!dest) return;

  const nights = Math.max(days - 1, 1);
  const flightPP = getFlightPrice(dest, currentMonthIdx);
  const flights = flightPP * 2; // two people
  const hotel = dest.hotelPerNight * nights;
  const food = dest.foodCostPerDay * 2 * days; // two people
  const total = flights + hotel + food;

  document.getElementById('bFlights').textContent = `£${flights}`;
  document.getElementById('bHotel').textContent = `£${hotel}`;
  document.getElementById('bFood').textContent = `£${food}`;
  document.getElementById('bTotal').textContent = `£${total}`;
}

// ============================================================
// INIT
// ============================================================
renderCards();
initBudgetSelect();
updateBudget();
</script>
